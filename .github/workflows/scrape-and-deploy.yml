# =====================================================================
# Alquileres Gualeguaychú — Pipeline diario de scraping + deploy
# =====================================================================
# Cada día (y con botón manual):
#   1. Corre los scrapers (Python) -> escribe directo a Supabase
#   2. Verifica que el sitio siga compilando con los datos nuevos
#   3. El push (si hay cambios en la DB local) dispara el deploy
#
# SECRETOS NECESARIOS (Settings > Secrets and variables > Actions):
#   FIRECRAWL_API_KEY           -> obligatorio para scrapers con Firecrawl
#   SUPABASE_URL                -> URL del proyecto Supabase
#   SUPABASE_SERVICE_ROLE_KEY   -> JWT con rol service_role (escritura)
# =====================================================================
name: Scrape & Deploy

on:
  schedule:
    # 08:00 UTC = 05:00 ART (madrugada, antes del horario pico)
    - cron: "0 8 * * *"
  workflow_dispatch: {}   # botón "Run workflow" manual
  # Quitá el comentario para correr en cada PR:
  # pull_request:

permissions:
  contents: write   # para commitear la DB local si cambia

concurrency:
  group: scrape-and-deploy
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Correr scrapers → Supabase
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m scrapers.run

      # La DB local sigue actualizándose como cache/fallback.
      # Si cambió, la commiteamos para mantener sincronía.
      - name: Detectar cambios en la DB local
        id: diff
        run: |
          git add data/alquileres.db
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambios en DB local."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commitear DB local actualizada
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): actualización diaria de alquileres [skip ci]"
          git push

  # Verificación: el sitio sigue compilando
  build-check:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build (genera JSON + compila Next.js)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
