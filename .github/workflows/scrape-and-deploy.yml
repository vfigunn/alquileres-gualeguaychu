# =====================================================================
# Alquileres Gualeguaychú — Pipeline diario de scraping + deploy
# =====================================================================
# Cada día (y con botón manual):
#   1. Corre los scrapers (Python) -> actualiza data/alquileres.db
#   2. Si la DB cambió -> commitea el archivo a main
#   3. El push dispara el deploy del sitio (Vercel/Netlify/GitHub Pages)
#
# SECRETOS NECESARIOS (Settings > Secrets and variables > Actions):
#   FIRECRAWL_API_KEY   -> obligatorio para que los scrapers funcionen
#   (Deploy) Si usás Vercel/Netlify, su token se configura allá, no acá.
#
# El archivo `data/alquileres.db` SÍ se commitea (es el estado compartido
# entre el runner efímero y el build del sitio). Ver .gitignore.
# =====================================================================
name: Scrape & Deploy

on:
  schedule:
    # 08:00 UTC = 05:00 ART (de madrugada, antes del horario pico).
    # GitHub Actions no garantiza el minuto exacto; puede correr algo después.
    - cron: "0 8 * * *"
  workflow_dispatch: {}   # botón "Run workflow" en la pestaña Actions
  # Quitá el comentario si querés que se corra en cada PR (para probar):
  # pull_request:

permissions:
  contents: write   # para poder commitear la DB actualizada

concurrency:
  group: scrape-and-deploy
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Correr scrapers
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          python -m scrapers.run

      - name: Detectar cambios en la DB
        id: diff
        run: |
          git add data/alquileres.db
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambios nuevos."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commitear DB actualizada
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): actualización diaria de alquileres [skip ci]"
          git push

      # El push dispara automáticamente el deploy en Vercel/Netlify/Pages
      # (auto-deploy on push). Si usás GitHub Pages con este mismo workflow,
      # agregá acá el job de build+deploy de NextJS (output: export).

  # Build de verificación: asegura que el sitio sigue compilando con la DB nueva.
  build-check:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # para traer el último commit con la DB (si hubo)

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build (genera JSON + compila el sitio)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
